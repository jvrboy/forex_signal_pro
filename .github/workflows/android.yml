name: Android CI/CD

on:
  push:
    branches: [main, develop]
    tags:
      - 'v*'
  pull_request:
    branches: [main, develop]
  release:
    types: [published]
  workflow_dispatch:

jobs:
  detect-android:
    runs-on: ubuntu-latest
    outputs:
      has-android: ${{ steps.check.outputs.exists }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        run: echo "exists=$(test -d android/app && echo true || echo false)" >> $GITHUB_OUTPUT

  lint:
    needs: detect-android
    if: needs.detect-android.outputs.has-android == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: gradle-
      - name: Run Android lint
        run: cd android && ./gradlew lintDebug --stacktrace

  test:
    needs: detect-android
    if: needs.detect-android.outputs.has-android == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        api-level: [24, 29, 34]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: gradle-
      - name: Unit tests
        run: cd android && ./gradlew testDebugUnitTest
      - name: Instrumented tests (API ${{ matrix.api-level }})
        uses: reactivecircus/android-emulator-runner@v1
        with:
          api-level: ${{ matrix.api-level }}
          target: google_apis
          arch: x86_64
          profile: nexus-5
        if: false # disable instrumented in CI due to emulator constraints
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: test-results-api-${{ matrix.api-level }}
          path: android/app/build/reports/tests

  build-debug:
    needs: detect-android
    if: needs.detect-android.outputs.has-android == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        api-level: [24, 29, 34]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: gradle-
      - name: Build debug APK (API ${{ matrix.api-level }})
        run: cd android && ./gradlew assembleDebug -PminSdkVersion=${{ matrix.api-level }}
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk-api-${{ matrix.api-level }}
          path: android/app/build/outputs/apk/debug/*.apk

  build-release:
    needs: detect-android
    if: needs.detect-android.outputs.has-android == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: gradle-
      - name: Decode keystore
        run: |
          if [ -n "$ANDROID_SIGNING_KEY" ]; then
            echo "$ANDROID_SIGNING_KEY" | base64 -d > android/app/debug.keystore
          fi
        env:
          ANDROID_SIGNING_KEY: ${{ secrets.ANDROID_SIGNING_KEY }}
      - name: Build release APK
        run: |
          if [ -f android/app/debug.keystore ]; then
            cd android && ./gradlew assembleRelease -PsigningProperties=signing.properties
          else
            cd android && ./gradlew assembleRelease
          fi
        env:
          SIGNING_PROPERTIES: ${{ secrets.ANDROID_SIGNING_PROPERTIES }}
      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: android/app/build/outputs/apk/release/*.apk

  release:
    needs: [build-debug, build-release]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/**/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}