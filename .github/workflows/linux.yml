name: Linux CI/CD

on:
  push:
    branches: [main, develop]
    tags:
      - 'v*'
  pull_request:
    branches: [main, develop]
  release:
    types: [published]
  workflow_dispatch:

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      has-electron: ${{ steps.detect.outputs.electron }}
      has-appimage: ${{ steps.detect.outputs.appimage }}
    steps:
      - uses: actions/checkout@v4
      - id: detect
        shell: bash
        run: |
          electron="false"
          appimage="false"
          if [ -f package.json ] && grep -q '"electron"' package.json 2>/dev/null; then
            electron="true"
          fi
          if [ -f package.json ] && grep -q '"appimage"' package.json 2>/dev/null; then
            appimage="true"
          fi
          echo "electron=$electron" >> $GITHUB_OUTPUT
          echo "appimage=$appimage" >> $GITHUB_OUTPUT

  electron-build:
    needs: detect
    if: needs.detect.outputs.has-electron == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [x64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.electron
            ~/.cache
          key: linux-electron-${{ hashFiles('package-lock.json') }}
          restore-keys: linux-electron-
      - name: Install dependencies
        run: npm ci
      - name: Build Electron Linux
        shell: bash
        run: |
          npx electron-builder --linux AppImage --x64 --publish never 2>&1 | tee electron-linux-build.log
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-electron
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/*.snap
            dist/*.tar.gz
            release/*.AppImage

  release:
    needs: electron-build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
