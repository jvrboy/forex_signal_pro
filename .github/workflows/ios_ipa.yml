name: Build iOS Unsigned IPA

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ios-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          architecture: x64

      - name: Create required asset directories
        run: |
          mkdir -p assets/gguf_models assets/onnx_models assets/fonts assets/icons

      - name: Regenerate iOS platform files
        run: flutter create --project-name forex_signal_pro --platforms ios .

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze Dart code
        run: flutter analyze
        continue-on-error: true

      - name: Run tests
        run: flutter test
        continue-on-error: true

      - name: CocoaPods setup
        run: |
          cd ios
          pod repo update
          pod install

      - name: Build iOS (skip codesign)
        run: |
          flutter build ios --release --no-codesign --no-tree-shake-icons 2>&1 | tee ${{ runner.temp }}/flutter_build.log
        continue-on-error: true

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-build-log
          path: ${{ runner.temp }}/flutter_build.log

      - name: Create archive (no codesign)
        run: |
          cd ios
          rm -rf ${{ runner.temp }}/Runner.xcarchive
          xcodebuild \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath ${{ runner.temp }}/Runner.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Create unsigned IPA from archive
        run: |
          cd ${{ runner.temp }}
          # Get the .app from inside the xcarchive
          APP_PATH="${{ runner.temp }}/Runner.xcarchive/Products/Applications/Runner.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "ERROR: $APP_PATH not found"
            ls -la ${{ runner.temp }}/Runner.xcarchive/Products/ 2>&1
            exit 1
          fi
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          # Ad-hoc sign the binary so it loads on devices
          /usr/bin/codesign --force --sign - --timestamp=none Payload/Runner.app 2>&1 || true
          zip -r -q Runner-unsigned.ipa Payload
          ls -la Runner-unsigned.ipa
          mkdir -p ${{ runner.temp }}/ipa
          mv Runner-unsigned.ipa ${{ runner.temp }}/ipa/
          rm -rf Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: forex-signal-pro-unsigned-ipa
          path: ${{ runner.temp }}/ipa/*.ipa
          if-no-files-found: error
