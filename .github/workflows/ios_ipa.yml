name: Build iOS Unsigned IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ios-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          architecture: x64

      - name: Verify Flutter installation
        run: flutter doctor

      - name: Create required asset directories
        run: |
          mkdir -p assets/gguf_models assets/onnx_models assets/fonts assets/icons

      - name: Regenerate iOS platform files
        run: flutter create --project-name forex_signal_pro --platforms ios .

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze Dart code
        run: flutter analyze
        continue-on-error: true

      - name: Run tests
        run: flutter test
        continue-on-error: true

      - name: CocoaPods setup
        run: |
          cd ios
          pod repo update
          pod install

      - name: Check iOS project structure
        run: |
          ls -la ios/
          ls -la ios/Runner/
          echo "--- Podfile ---"
          cat ios/Podfile 2>/dev/null || echo "No Podfile found"

      - name: Build iOS Release (no code signing)
        run: |
          flutter build ios --release --no-codesign --verbose 2>&1 | tee ${{ runner.temp }}/flutter_build.log
        continue-on-error: true

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-build-log
          path: ${{ runner.temp }}/flutter_build.log

      - name: Create archive and export unsigned IPA
        run: |
          cd ios
          xcodebuild -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath ${{ runner.temp }}/Runner.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

          xcodebuild -exportArchive \
            -archivePath ${{ runner.temp }}/Runner.xcarchive \
            -exportPath ${{ runner.temp }}/ipa \
            -exportOptionsPlist ../.github/export-unsigned.plist

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: forex-signal-pro-unsigned-ipa
          path: ${{ runner.temp }}/ipa/*.ipa
          if-no-files-found: error
