name: iOS CI/CD

on:
  push:
    branches: [main, develop]
    tags:
      - 'v*'
  pull_request:
    branches: [main, develop]
  release:
    types: [published]
  workflow_dispatch:

jobs:
  detect-ios:
    runs-on: macos-latest
    outputs:
      has-ios: ${{ steps.check.outputs.exists }}
      ios-dir: ${{ steps.check.outputs.ios_dir }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        run: |
          exists="false"
          dir="ios"
          for d in "ios" "ios/App" "Platforms/ios" "mobile/ios" "app/ios" "forex_app/ios" "native/ios"; do
            if [ -d "$d" ]; then
              if ls "$d"/*.xcworkspace &> /dev/null || ls "$d"/*.xcodeproj &> /dev/null; then
                exists="true"
                dir="$d"
                break
              fi
            fi
          done
          echo "exists=$exists" >> $GITHUB_OUTPUT
          echo "ios_dir=$dir" >> $GITHUB_OUTPUT

  lint:
    needs: detect-ios
    if: needs.detect-ios.outputs.has-ios == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: |
            ${{ needs.detect-ios.outputs.ios-dir }}/Pods
            ~/Library/Caches/CocoaPods
          key: pods-${{ hashFiles(format('{0}/Podfile.lock', needs.detect-ios.outputs.ios-dir)) }}
          restore-keys: pods-
      - name: Check Xcode version
        run: xcodebuild -version
      - name: Check scheme
        run: |
          if [ -f ${{ needs.detect-ios.outputs.ios-dir }}/*.xcworkspace ]; then
            xcodebuild -workspace ${{ needs.detect-ios.outputs.ios-dir }}/*.xcworkspace -list
          elif [ -f ${{ needs.detect-ios.outputs.ios-dir }}/*.xcodeproj ]; then
            xcodebuild -project ${{ needs.detect-ios.outputs.ios-dir }}/*.xcodeproj -list
          fi

  test:
    needs: detect-ios
    if: needs.detect-ios.outputs.has-ios == 'true'
    runs-on: macos-latest
    strategy:
      matrix:
        destination: ['platform=iOS Simulator,name=iPhone 15']
    steps:
      - uses: actions/checkout@v4
      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: |
            ${{ needs.detect-ios.outputs.ios-dir }}/Pods
            ~/Library/Caches/CocoaPods
          key: pods-test-${{ hashFiles(format('{0}/Podfile.lock', needs.detect-ios.outputs.ios-dir)) }}
          restore-keys: pods-test-
      - name: Install pods
        run: |
          if [ -f ${{ needs.detect-ios.outputs.ios-dir }}/Podfile ]; then
            cd ${{ needs.detect-ios.outputs.ios-dir }} && pod install
          fi
        continue-on-error: true
      - name: Build for simulator (iOS 15+)
        run: |
          if [ -f ${{ needs.detect-ios.outputs.ios-dir }}/*.xcworkspace ]; then
            xcodebuild build \
              -workspace ${{ needs.detect-ios.outputs.ios-dir }}/*.xcworkspace \
              -scheme $(xcodebuild -workspace ${{ needs.detect-ios.outputs.ios-dir }}/*.xcworkspace -list | sed -n '2p') \
              -destination '${{ matrix.destination }}' \
              -sdk iphonesimulator \
              -configuration Debug 2>&1 | tee sim-build.log
          elif [ -f ${{ needs.detect-ios.outputs.ios-dir }}/*.xcodeproj ]; then
            xcodebuild build \
              -project ${{ needs.detect-ios.outputs.ios-dir }}/*.xcodeproj \
              -destination '${{ matrix.destination }}' \
              -sdk iphonesimulator 2>&1 | tee sim-build.log
          fi
        continue-on-error: true
      - name: Run tests
        run: |
          if [ -f ${{ needs.detect-ios.outputs.ios-dir }}/*.xcworkspace ]; then
            xcodebuild test \
              -workspace ${{ needs.detect-ios.outputs.ios-dir }}/*.xcworkspace \
              -scheme $(xcodebuild -workspace ${{ needs.detect-ios.outputs.ios-dir }}/*.xcworkspace -list | sed -n '2p') \
              -destination '${{ matrix.destination }}' 2>&1 | tee sim-test.log
          fi
        continue-on-error: true
      - name: Upload test results
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            build/logs/*.test.xcresult
            **/TestSummaries/**/*.xml
            sim-build.log
            sim-test.log

  build-device:
    needs: detect-ios
    if: needs.detect-ios.outputs.has-ios == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: |
            ${{ needs.detect-ios.outputs.ios-dir }}/Pods
            ~/Library/Caches/CocoaPods
          key: pods-build-${{ hashFiles(format('{0}/Podfile.lock', needs.detect-ios.outputs.ios-dir)) }}
          restore-keys: pods-build-
      - name: Install pods
        run: |
          if [ -f ${{ needs.detect-ios.outputs.ios-dir }}/Podfile ]; then
            cd ${{ needs.detect-ios.outputs.ios-dir }} && pod install
          fi
        continue-on-error: true
      - name: Build for device (unsigned IPA)
        run: |
          cd ${{ needs.detect-ios.outputs.ios-dir }}
          mkdir -p build
          if [ -f *.xcworkspace ]; then
            xcodebuild archive \
              -workspace *.xcworkspace \
              -scheme $(xcodebuild -workspace *.xcworkspace -list | sed -n '2p') \
              -destination 'generic/platform=iOS' \
              -configuration Release \
              -archivePath build/App \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGNING_REQUIRED=NO \
              AD_HOC_CODE_SIGNING_ALLOWED=YES 2>&1 | tee archive-build.log
          elif [ -f *.xcodeproj ]; then
            xcodebuild archive \
              -project *.xcodeproj \
              -destination 'generic/platform=iOS' \
              -configuration Release \
              -archivePath build/App \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGNING_REQUIRED=NO \
              AD_HOC_CODE_SIGNING_ALLOWED=YES 2>&1 | tee archive-build.log
          fi
        continue-on-error: true
      - name: Create unsigned IPA from archive
        run: |
          cd ${{ needs.detect-ios.outputs.ios-dir }}
          if [ -d build/App.xcarchive ]; then
            APP_PATH="build/App.xcarchive/Products/Applications"
            APP_NAME=$(ls "$APP_PATH" 2>/dev/null | head -1)
            if [ -n "$APP_NAME" ] && [ -d "$APP_PATH/$APP_NAME" ]; then
              mkdir -p Payload
              cp -R "$APP_PATH/$APP_NAME" Payload/
              /usr/bin/codesign --force --sign - --timestamp=none Payload/"$APP_NAME" 2>&1 || true
              zip -r -q "${APP_NAME%.app}-unsigned.ipa" Payload
              mkdir -p build/ipa-output
              mv "${APP_NAME%.app}-unsigned.ipa" build/ipa-output/
              rm -rf Payload
            fi
          fi
        continue-on-error: true
      - name: Upload IPA
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: |
            ${{ needs.detect-ios.outputs.ios-dir }}/build/ipa-output/*.ipa
            ${{ needs.detect-ios.outputs.ios-dir }}/archive-build.log

  release:
    needs: build-device
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
