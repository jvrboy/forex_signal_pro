name: Windows CI/CD

on:
  push:
    branches: [main, develop]
    tags:
      - 'v*'
  pull_request:
    branches: [main, develop]
  release:
    types: [published]
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  detect:
    runs-on: windows-latest
    outputs:
      has-electron: ${{ steps.detect.outputs.electron }}
      has-msbuild: ${{ steps.detect.outputs.msbuild }}
      has-tauri: ${{ steps.detect.outputs.tauri }}
      has-pwa: ${{ steps.detect.outputs.pwa }}
      build-tool: ${{ steps.detect.outputs.tool }}
    steps:
      - uses: actions/checkout@v4
      - id: detect
        shell: bash
        run: |
          electron="false"
          msbuild="false"
          tauri="false"
          pwa="false"
          tool="none"
          if [ -f package.json ] && grep -q '"electron"' package.json 2>/dev/null; then
            electron="true"
            tool="electron"
          fi
          if [ -d electron ] && [ -f electron/package.json ]; then
            electron="true"
            tool="electron"
          fi
          if ls *.sln &> /dev/null; then
            msbuild="true"
            tool="msbuild"
          fi
          if find . -maxdepth 3 -name "tauri.conf.json" 2>/dev/null | head -1 | grep -q .; then
            tauri="true"
            tool="tauri"
          fi
          if [ -f index.html ] && [ ! -d android ] && [ ! -d ios ]; then
            pwa="true"
            if [ "$tool" = "none" ]; then
              tool="pwa"
            fi
          fi
          echo "electron=$electron" >> $GITHUB_OUTPUT
          echo "msbuild=$msbuild" >> $GITHUB_OUTPUT
          echo "tauri=$tauri" >> $GITHUB_OUTPUT
          echo "pwa=$pwa" >> $GITHUB_OUTPUT
          echo "tool=$tool" >> $GITHUB_OUTPUT

  electron-build:
    needs: detect
    if: needs.detect.outputs.has-electron == 'true'
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            electron/node_modules
            ~/.electron
            ~/.cache
          key: electron-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: electron-${{ runner.os }}-
      - name: Install root dependencies
        run: |
          if [ -f package.json ]; then
            npm ci
          fi
      - name: Install electron dependencies
        run: |
          if [ -d electron ] && [ -f electron/package.json ]; then
            cd electron && npm ci
          fi
      - name: Build app
        run: |
          if grep -q '"build"' package.json; then
            npm run build 2>&1 | tee electron-build.log
          else
            echo "No build script"
          fi
        continue-on-error: true
      - name: Build Windows installer (NSIS + portable)
        run: |
          if [ -d electron ]; then
            cd electron
            npx electron-builder --win --x64 --publish never 2>&1 | tee -a electron-build.log
          else
            npx electron-builder --win --x64 --publish never 2>&1 | tee -a electron-build.log
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
      - name: Upload artifacts
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: windows-electron-installer
          path: |
            electron/release/*.exe
            electron/release/*.msi
            release/*.exe
            release/*.msi
            electron-build.log

  tauri-build:
    needs: detect
    if: needs.detect.outputs.has-tauri == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
        if: hashFiles('**/package.json') != ''
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: tauri-cargo-windows-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: tauri-cargo-windows-
      - name: Find tauri.conf.json
        id: find_tauri
        run: |
          $conf = (Get-ChildItem -Path . -Filter tauri.conf.json -Recurse -Depth 3 -ErrorAction SilentlyContinue | Select-Object -First 1).DirectoryName
          if ($conf) {
            echo "tauri_dir=$conf" >> $env:GITHUB_OUTPUT
          }
        shell: pwsh
      - name: Build with Tauri
        run: |
          if (Test-Path "${{ steps.find_tauri.outputs.tauri_dir }}") {
            Push-Location "${{ steps.find_tauri.outputs.tauri_dir }}"
            cargo tauri build --target x86_64-pc-windows-msvc --bundles nsis 2>&1 | Tee-Object tauri-build.log
            Pop-Location
          }
        shell: pwsh
        continue-on-error: true
      - name: Upload Tauri artifacts
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: windows-tauri
          path: |
            ${{ steps.find_tauri.outputs.tauri_dir }}/target/x86_64-pc-windows-msvc/release/bundle/**/*.msi
            ${{ steps.find_tauri.outputs.tauri_dir }}/target/x86_64-pc-windows-msvc/release/bundle/**/*.exe
            tauri-build.log

  msbuild-build:
    needs: detect
    if: needs.detect.outputs.has-msbuild == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: microsoft/setup-msbuild@v2
      - name: Build solution
        run: |
          msbuild *.sln /p:Configuration=Release /p:Platform=x64 /t:Build /v:minimal
        continue-on-error: true
      - name: Upload artifacts
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: windows-msbuild-output
          path: |
            **/bin/Release/**/*.exe
            **/bin/Release/**/*.msi
            **/Release/**/*.exe

  pwa-bundle:
    needs: detect
    if: needs.detect.outputs.has-pwa == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Install dependencies
        run: |
          if (Test-Path package.json) { npm ci }
        shell: pwsh
      - name: Build web app
        run: |
          if (Select-String -Path package.json -Pattern '"build"' -Quiet) {
            npm run build 2>&1 | Tee-Object build.log
          } else {
            Write-Host "No build script"
          }
        shell: pwsh
        continue-on-error: true
      - name: Create Windows zip
        run: |
          New-Item -ItemType Directory -Force -Path build/outputs/windows | Out-Null
          if (Test-Path dist) {
            Compress-Archive -Path "dist\*" -DestinationPath build/outputs/windows/web-app.zip -Force
          } elseif (Test-Path build) {
            Compress-Archive -Path "build\*" -DestinationPath build/outputs/windows/web-app.zip -Force
          } else {
            New-Item -ItemType Directory -Force -Path build/outputs/windows/dist | Out-Null
            Copy-Item -Path * -Destination build/outputs/windows/dist/ -Recurse -Force -Exclude @('.git', 'node_modules', 'build')
            Compress-Archive -Path "build/outputs/windows/dist\*" -DestinationPath build/outputs/windows/web-app.zip -Force
          }
        shell: pwsh
      - name: Upload PWA artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pwa-windows-build
          path: |
            build/outputs/windows/**
            build.log

  release:
    needs: [electron-build, tauri-build, msbuild-build, pwa-bundle]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
