name: forex_signal_pro
description: A high-quality cross-platform forex signal trading app with AI agent, 350+ indicators, 400+ strategies, and self-optimizing neural network.
version: 0.1.0+1
publish_to: none

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  web_socket_channel: ^3.0.2
  http: ^1.2.2
  shared_preferences: ^2.3.4
  flutter_secure_storage: ^9.2.4
  workmanager: ^0.5.2
  flutter_local_notifications: ^18.0.1
  uuid: ^4.5.1
  intl: ^0.19.0
  share_plus: ^10.1.4
  path_provider: ^2.1.5
  package_info_plus: ^8.1.2
  url_launcher: ^6.3.1
  collection: ^1.18.0
  equatable: ^2.0.7
  logger: ^2.5.0
  flutter_animate: ^4.5.2
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  json_annotation: ^4.9.0
  xml: ^6.5.0
  glass_kit: ^2.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.4
  very_good_analysis: ^6.0.0
  build_runner: ^2.4.13
  isar_generator: ^3.1.0+1
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  assets:
    - assets/gguf_models/
    - assets/onnx_models/
    - assets/fonts/
    - assets/icons/
